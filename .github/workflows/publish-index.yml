name: Publish ChromaDB Index

# Run manually from Actions tab whenever translations change.
# Builds the full index and uploads it to a GitHub Release so the
# Dockerfile can download it instead of building from scratch.
on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-multilingual-e5-small-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Bible SQLite files
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/scrollmapper/bible_databases /tmp/bible_db
          cd /tmp/bible_db
          git sparse-checkout set --no-cone \
            "formats/sqlite/GerBoLut.db" \
            "formats/sqlite/KJV.db" \
            "formats/sqlite/NHEB.db"
          git checkout

      - name: Build full index
        env:
          BIBLE_DB_PATH: /tmp/bible_db/formats/sqlite
          CHROMA_PATH: ./bible_chroma_db
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m luther_mcp index

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/create_release.py
