name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  validate-docker-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify git sparse-checkout downloads Bible SQLite files
        # Mirrors the Dockerfile RUN step exactly — catches cone-mode errors,
        # missing files, and path renames in the upstream repo.
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/scrollmapper/bible_databases /tmp/bible_db
          cd /tmp/bible_db
          git sparse-checkout set --no-cone \
            "formats/sqlite/GerBoLut.db" \
            "formats/sqlite/KJV.db" \
            "formats/sqlite/NHEB.db"
          git checkout
          test -f formats/sqlite/GerBoLut.db || { echo "MISSING: GerBoLut.db"; exit 1; }
          test -f formats/sqlite/KJV.db      || { echo "MISSING: KJV.db";      exit 1; }
          test -f formats/sqlite/NHEB.db     || { echo "MISSING: NHEB.db";     exit 1; }
          echo "All SQLite files present"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run indexer against downloaded SQLite files
        # Exercises the full indexer code path (chromadb, sentence-transformers)
        # so API breakage is caught before the HF Space Docker build.
        env:
          BIBLE_DB_PATH: /tmp/bible_db/formats/sqlite
          CHROMA_PATH: /tmp/bible_chroma_db
        run: python -m luther_mcp index
